<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senna</title>
    <link rel="stylesheet" href="senna.css">
</head>
<body>
    <div class="container">
        <div class="col-left">
            <div class="left-top">
                <div class="item1 item">
                    <img  class="main-image" src="images/sennamain.jpg" alt="whatever">
                    <div class="overlay">
                        <h1 class="main-title">SENNA</h1>
                        <p class="main-description">The Redeemer</p>
                    </div>
                </div>
                <div class="item2 item">
                    <div class="carousel">
                        <img src="images/senna1.jpg" class="slide active">
                        <img src="images/senna2.jpg" class="slide">
                        <img src="images/senna3.jpg" class="slide">

                    </div>
                    <div class="overlay">
                        <h2 class="item-2-maintitle">SKINS</h2>
                    </div>
                </div>

            </div>
            <div class="left-bottom">
                <div class="item item3"></div>
                <div class="item item4"></div>
                <div class="item item5"></div>
            </div>

        </div>
        <div class="col-right">
            <div class="item6 item"></div>
            <div class="item7 item"></div>

        </div>
    </div>
    <script>
const slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 3000);
</script>
</body>
</html>
